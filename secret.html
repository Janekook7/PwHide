<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castaway | Secret Codes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #4f46e5;
            --text-light: #ffffff;
            --text-dim: #cbd5e1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-blurred {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0f172a; 
            background-image: url('Pics/PwHideLogo.png');
            background-size: 100vw auto; 
            background-position: center 20%; 
            background-repeat: no-repeat; 
            filter: blur(12px) brightness(0.8);
            transform: scale(1.05);
            z-index: -1;
        }

        .hero-solid-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 85px;
            background-color: rgba(10, 10, 10, 0.85); 
            z-index: 10;
        }

        nav {
            position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box;
            display: flex; justify-content: center; align-items: center;
            height: 85px; padding: 0 4rem; z-index: 11;
        }

        .nav-inner { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1100px; }
        .nav-brand { font-weight: 700; font-size: 1.5rem; color: var(--text-light); }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-link { background: none; border: none; font-family: 'Inter', sans-serif; font-size: 1.05rem; font-weight: 600; color: #9ca3af; cursor: pointer; text-decoration: none; transition: color 0.2s; }
        .nav-link:hover { color: var(--text-light); text-decoration: underline; text-underline-offset: 6px; }

        .main-wrapper {
            position: relative; z-index: 5; padding-top: 120px; 
            min-height: calc(100vh - 120px); display: flex; justify-content: center;
            align-items: center; padding-bottom: 3rem; box-sizing: border-box;
        }

        .glass-box {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 3.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%; max-width: 450px; text-align: center;
        }

        .glass-box h2 { margin-top: 0; font-size: 2rem; color: var(--text-light); margin-bottom: 1.5rem; }
        
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem; font-weight: 600; }
        .form-group input {
            width: 100%; padding: 0.75rem 1rem; box-sizing: border-box;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: white; font-family: 'Inter', sans-serif;
            font-size: 1rem; transition: border 0.3s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); }

        .submit-btn {
            background-color: var(--primary); color: white; border: none;
            padding: 0.8rem 2rem; border-radius: 50px; font-weight: 600;
            cursor: pointer; font-size: 1rem; width: 100%;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); transition: all 0.2s ease;
        }
        .submit-btn:hover { background-color: #4338ca; transform: translateY(-2px); }

        #result-message { margin-top: 1.5rem; font-weight: 600; font-size: 1.1rem; height: 1.5rem; }

    </style>
</head>
<body>

    <div class="bg-blurred"></div>
    <div class="hero-solid-bar"></div>
    <nav>
        <div class="nav-inner">
            <div class="nav-brand">Castaway</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Back to Home</a>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="glass-box">
            <h2>Claim Secret Code</h2>
            
            <div class="form-group">
                <label>Minecraft Username</label>
                <input type="text" id="username" placeholder="e.g. Notch">
            </div>

            <div class="form-group">
                <label>Secret Code</label>
                <input type="text" id="secretCode" placeholder="Enter your code...">
            </div>

            <button class="submit-btn" onclick="verifyCode()">Check Code</button>
            
            <!-- This is where the Correct/Incorrect answer will show -->
            <p id="result-message"></p>
        </div>
    </div>

    <script>
        // -------------------------------------------------------------
        // PUT YOUR SCRAMBLED CODES (HASHES) HERE
        // -------------------------------------------------------------
        const validCodes = [
            "81c9d6128b5fcd7bbe4ba65c177388ff767a2017f971c053dcaa6f32b4d6a758" // hash for "diamond"
        ];

        // Your secure Formspree endpoint
        const formspreeUrl = "https://formspree.io/f/mbdwbnyl";

        async function hashText(message) {
            const msgBuffer = new TextEncoder().encode(message.toLowerCase().trim());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function verifyCode() {
            const username = document.getElementById("username").value.trim();
            const codeInput = document.getElementById("secretCode").value.trim();
            const resultText = document.getElementById("result-message");

            if(username === "" || codeInput === "") {
                resultText.innerText = "Please enter both fields!";
                resultText.style.color = "#fbbf24"; 
                return;
            }

            resultText.innerText = "Checking...";
            resultText.style.color = "white";

            const scrambledInput = await hashText(codeInput);

            // Check if they already claimed this specific hash
            const claimedCodes = JSON.parse(localStorage.getItem('claimedCodes')) || [];
            if(claimedCodes.includes(scrambledInput)) {
                resultText.innerText = "⚠️ You already claimed this code!";
                resultText.style.color = "#fbbf24"; 
                return;
            }

            // If the code is correct
            if(validCodes.includes(scrambledInput)) {
                resultText.innerText = "✅ Correct! Awesome job, " + username + "!";
                resultText.style.color = "#10b981"; 
                
                // Save it to the player's browser
                claimedCodes.push(scrambledInput);
                localStorage.setItem('claimedCodes', JSON.stringify(claimedCodes));

                // Send the data silently to Formspree using Vanilla JS (AJAX)
                fetch(formspreeUrl, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Accept": "application/json" // This stops Formspree from redirecting the page
                    },
                    body: JSON.stringify({
                        Username: username,
                        Message: "Just successfully claimed a secret code!",
                        Code_Entered: codeInput
                    })
                }).catch(err => console.log("Formspree error:", err));
                
            } else {
                // Code is wrong, do NOT send to Formspree
                resultText.innerText = "❌ Incorrect code, keep looking!";
                resultText.style.color = "#ef4444"; 
            }
        }
    </script>
</body>
</html>
